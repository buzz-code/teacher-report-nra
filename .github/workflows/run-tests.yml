name: Run tests on pull request

on:
  pull_request:
    branches:
    - main

jobs:
  prepare:
    name: Prepare changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.changes.outputs.client }}
      server: ${{ steps.changes.outputs.server }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Filter changes
      uses: dorny/paths-filter@v2
      id: changes
      with:
        filters: |
          client:
            - 'client/**'
          server:
            - 'server/**'


  reusable-tests:
    needs: prepare
    uses: buzz-code/multi-repo-codespace/.github/workflows/reusable-tests.yml@main
    with:
      run_client: ${{ needs.prepare.outputs.client == 'true' || false }}
      run_server: ${{ needs.prepare.outputs.server == 'true' || false }}

